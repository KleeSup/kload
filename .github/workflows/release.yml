name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          build() {
            local goos=$1 goarch=$2 ext=$3
            local out="dist/kload-${goos}-${goarch}${ext}"
            echo "Building ${out}"
            GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 \
              go build -ldflags="${LDFLAGS}" -o "${out}" ./main.go
          }

          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 ".exe"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kload-*
            dist/checksums.txt
          generate_release_notes: true
